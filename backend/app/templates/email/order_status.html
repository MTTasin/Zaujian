{% comment %}
Customer order email. Table layout + inline styles only — email clients strip
<style> blocks and do not support flex/grid. No <img> anywhere: Gmail blocks
remote images by default and this audience will not tap "display images", so the
brand is text on a coloured band instead. No webfonts either; Bengali renders
through the device's own fonts.
{% endcomment %}
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
       style="margin:0;padding:0;background:#faf6ee;">
  <tr>
    <td align="center" style="padding:24px 12px;">

      <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0"
             style="width:100%;max-width:600px;background:#fffdf9;border-radius:16px;overflow:hidden;border:1px solid #e7dccc;">

        <tr>
          <td align="center" style="background:#38182f;padding:26px 20px;">
            <div style="font-family:Georgia,'Times New Roman',serif;font-size:22px;line-height:1.3;font-weight:bold;color:#ffffff;letter-spacing:0.4px;">
              Zaujain Nikah Point
            </div>
            <div style="height:2px;width:56px;background:#a9822f;margin:12px auto 0;"></div>
          </td>
        </tr>

        <tr>
          <td style="padding:28px 24px 8px;font-family:Arial,Helvetica,sans-serif;font-size:16px;line-height:1.75;color:#2a2028;">
            {{ greeting }}
          </td>
        </tr>

        <tr>
          <td style="padding:0 24px;font-family:Arial,Helvetica,sans-serif;font-size:17px;line-height:1.8;color:#2a2028;">
            {{ message }}
          </td>
        </tr>

        <tr>
          <td style="padding:20px 24px 4px;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
                   style="background:#f2eadd;border-radius:12px;">
              <tr>
                <td style="padding:14px 18px;font-family:Arial,Helvetica,sans-serif;font-size:15px;color:#5b2a4e;">
                  অর্ডার কোড
                </td>
                <td align="right" style="padding:14px 18px;font-family:Arial,Helvetica,sans-serif;font-size:19px;font-weight:bold;letter-spacing:1px;color:#5b2a4e;">
                  {{ order.uid }}
                </td>
              </tr>
            </table>
          </td>
        </tr>

        {% if advance %}
        <tr>
          <td style="padding:14px 24px 0;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
                   style="background:#fffdf9;border:1px solid #d9b877;border-radius:12px;">
              <tr>
                <td style="padding:16px 18px;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.85;color:#2a2028;">
                  <div style="font-weight:bold;color:#a9822f;padding-bottom:6px;">
                    অগ্রিম ৳{{ advance.amount }} পাঠাতে হবে
                  </div>
                  {% if advance.bkash %}<div>বিকাশ (সেন্ড মানি): <strong>{{ advance.bkash }}</strong></div>{% endif %}
                  {% if advance.nagad %}<div>নগদ (সেন্ড মানি): <strong>{{ advance.nagad }}</strong></div>{% endif %}
                  <div style="padding-top:6px;color:#8a7d84;font-size:14px;">
                    টাকা পাঠিয়ে ট্র্যাকিং পেজে ট্রানজেকশন আইডি দিন।
                  </div>
                </td>
              </tr>
            </table>
          </td>
        </tr>
        {% endif %}

        <tr>
          <td align="center" style="padding:26px 24px 8px;">
            <a href="{{ tracking_url }}"
               style="display:inline-block;background:#c25e8b;color:#ffffff;text-decoration:none;font-family:Arial,Helvetica,sans-serif;font-size:17px;font-weight:bold;padding:16px 34px;border-radius:999px;">
              অর্ডার ট্র্যাক করুন
            </a>
          </td>
        </tr>

        <tr>
          <td align="center" style="padding:4px 24px 24px;font-family:Arial,Helvetica,sans-serif;font-size:13px;line-height:1.7;color:#8a7d84;word-break:break-all;">
            {{ tracking_url }}
          </td>
        </tr>

        <tr>
          <td style="padding:0 24px;">
            <div style="height:1px;background:#e7dccc;"></div>
          </td>
        </tr>

        <tr>
          <td align="center" style="padding:18px 24px 26px;font-family:Arial,Helvetica,sans-serif;font-size:13px;line-height:1.8;color:#8a7d84;">
            {% if contact %}<div>যোগাযোগ: {{ contact }}</div>{% endif %}
            <div style="padding-top:4px;">— Zaujain Nikah Point</div>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
